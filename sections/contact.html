<section
  id="contact"
  class="full-height px-lg-5 py-5"
  data-aos="fade-up"
  data-aos-duration="1000">
  <div class="container">
    <!-- Section Heading -->
    <div
      class="row justify-content-center text-center mb-5"
      data-aos="fade-up"
      data-aos-duration="1000">
      <div class="col-lg-8">
        <h6 class="text-brand">Contact</h6>
        <h1>Interested in working together? Let's talk!</h1>
      </div>
    </div>

    <!-- Contact Form -->
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <form action="https://api.web3forms.com/submit" method="POST">
          <input
            type="hidden"
            name="access_key"
            value="c278a3db-c358-42d3-a047-01466efb2c33" />
          <input
            type="hidden"
            name="from_name"
            value="Raj Portfolio Contact" />
          <input type="checkbox" name="botcheck" class="d-none" />
          <!-- Name -->
          <div class="col-12">
            <input
              type="text"
              name="name"
              class="form-control"
              placeholder="Enter your name"
              required />
          </div>

          <!-- Email -->
          <div class="col-12">
            <input
              type="email"
              name="email"
              class="form-control"
              placeholder="Enter your email"
              required />
          </div>

          <!-- Subject -->
          <div class="col-12">
            <input
              type="text"
              name="subject"
              class="form-control"
              placeholder="Enter subject"
              required />
          </div>

          <!-- Message -->
          <div class="col-12">
            <textarea
              name="message"
              rows="5"
              class="form-control"
              placeholder="Enter your message"
              required></textarea>
          </div>

          <!-- Submit Button -->
          <div class="col-12 d-grid">
            <button type="submit" class="btn btn-brand">Contact Me</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
